<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication | LifePulse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f2f5;">
    <div class="card fade-in" style="width: 450px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle">Login to manage your donations</p>
        </div>

        <form id="auth-form">
            <div id="fullname-container" style="margin-bottom: 15px; display: none;">
                <label>Full Name</label>
                <input type="text" id="fullname" style="width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Email Address</label>
                <input type="email" id="email" required style="width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="margin-bottom: 25px;">
                <label>Password</label>
                <input type="password" id="password" required style="width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #ddd;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <span id="toggle-text">Don't have an account?</span> 
            <a href="#" id="toggle-auth" style="color: var(--primary); font-weight: 600;">Sign Up</a>
        </p>
        <p style="text-align: center; margin-top: 10px;">
            <a href="index.html" style="color: var(--gray); text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
