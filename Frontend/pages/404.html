<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — LifePulse</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg,#fff 0%,var(--red-light) 100%); }
    .err-box { text-align:center; max-width:480px; padding:40px 20px; }
    .err-code { font-size:6rem; font-weight:700; color:var(--red); font-family:var(--font-display); line-height:1; margin-bottom:12px; }
    .err-box h2 { margin-bottom:12px; }
    .err-box p { color:var(--gray-400); margin-bottom:28px; }
  </style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or you don't have permission to view it.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-primary" onclick="history.back()">← Go Back</button>
      <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
    </div>
  </div>
</body>
</html>
