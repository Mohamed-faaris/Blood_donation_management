<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users & Roles — LifePulse</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h1>Users & Roles</h1><p>Manage system users and their access roles.</p></div>
      </div>

      <div class="filters-bar">
        <input type="text" class="form-control" id="f-uname" placeholder="Search by name or email…" oninput="filterUsers()">
        <select class="form-control" id="f-role" onchange="filterUsers()">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="hospital">Hospital</option>
          <option value="donor">Donor</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('f-uname').value='';document.getElementById('f-role').value='';filterUsers()">✕ Clear</button>
        <span style="margin-left:auto;font-size:0.82rem;color:var(--gray-400);" id="user-count"></span>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0">
          <div id="users-table"><div class="loading-overlay"><div class="loading-spinner"></div><p>Loading…</p></div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Update Role Modal -->
<div class="modal-overlay" id="role-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Update User Role</span><button class="modal-close" onclick="closeModal('role-modal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="role-user-id">
      <div id="role-user-info" style="padding:14px;background:var(--gray-50);border-radius:var(--radius-md);margin-bottom:16px;font-size:0.875rem;"></div>
      <div class="form-group"><label class="form-label">New Role *</label>
        <select class="form-control" id="role-new">
          <option value="admin">Admin</option>
          <option value="hospital">Hospital</option>
          <option value="donor">Donor</option>
        </select>
      </div>
      <div class="alert alert-warning" style="margin-top:8px;">⚠️ Changing a user's role affects their access to the system immediately.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('role-modal')">Cancel</button>
      <button class="btn btn-primary" id="role-save" onclick="saveRole()">Update Role</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="user-edit-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit User</span><button class="modal-close" onclick="closeModal('user-edit-modal')">✕</button></div>
    <div class="modal-body">
      <div id="user-edit-alert"></div>
      <input type="hidden" id="edit-user-id">
      <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="edit-fname"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" id="edit-phone"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('user-edit-modal')">Cancel</button>
      <button class="btn btn-primary" id="user-edit-save" onclick="saveUserEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script>
let allUsers = [];
const roleColors = { admin:'red', hospital:'blue', donor:'green' };

document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth(['admin'])) return;
  buildLayout({ activePage: 'users.html', pageTitle: 'Users & Roles', breadcrumb: 'Home / Users' });
  await loadUsers();
});

async function loadUsers() {
  const res = await API.users.findAll();
  if (!res.ok) { document.getElementById('users-table').innerHTML = emptyState('❌','Failed to load',''); return; }
  allUsers = Array.isArray(res.data) ? res.data : (res.data?.data || []);
  filterUsers();
}

function filterUsers() {
  const q = document.getElementById('f-uname').value.toLowerCase();
  const role = document.getElementById('f-role').value;
  const filtered = allUsers.filter(u => {
    if (q && !u.fullName?.toLowerCase().includes(q) && !u.email?.toLowerCase().includes(q)) return false;
    if (role && u.role !== role) return false;
    return true;
  });
  document.getElementById('user-count').textContent = `${filtered.length} users`;
  renderUsers(filtered);
}

function renderUsers(users) {
  const el = document.getElementById('users-table');
  if (!users.length) { el.innerHTML = emptyState('👥','No users found',''); return; }
  el.innerHTML = `<div class="table-container"><table>
    <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Phone</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
    <tbody>${users.map(u => `<tr>
      <td><div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar avatar-sm">${initials(u.fullName||u.email)}</div>
        <span style="font-weight:600">${u.fullName||'—'}</span>
      </div></td>
      <td style="font-size:0.85rem">${u.email}</td>
      <td><span class="badge badge-${roleColors[u.role]||'gray'}">${u.role}</span></td>
      <td>${u.phone||'—'}</td>
      <td>${u.isActive ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-gray">Inactive</span>'}</td>
      <td style="font-size:0.8rem">${u.lastLoginAt ? timeAgo(u.lastLoginAt) : 'Never'}</td>
      <td><div class="table-actions">
        <button class="btn btn-ghost btn-sm" onclick="openRoleModal('${u.id}','${u.fullName||u.email}','${u.role}')">🔑 Role</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditUser('${u.id}','${u.fullName||''}','${u.phone||''}')">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteUser('${u.id}','${u.fullName||u.email}')">🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function openRoleModal(id, name, currentRole) {
  document.getElementById('role-user-id').value = id;
  document.getElementById('role-user-info').innerHTML = `<strong>${name}</strong> — Current role: <span class="badge badge-${roleColors[currentRole]||'gray'}">${currentRole}</span>`;
  document.getElementById('role-new').value = currentRole;
  openModal('role-modal');
}

async function saveRole() {
  const id = document.getElementById('role-user-id').value;
  const role = document.getElementById('role-new').value;
  setButtonLoading('role-save', true);
  const res = await API.users.updateRole(id, { role });
  setButtonLoading('role-save', false);
  if (!res.ok) { showToast(res.data?.message||'Failed','error'); return; }
  closeModal('role-modal'); showToast('Role updated!','success'); loadUsers();
}

function openEditUser(id, name, phone) {
  document.getElementById('edit-user-id').value = id;
  document.getElementById('edit-fname').value = name;
  document.getElementById('edit-phone').value = phone;
  document.getElementById('user-edit-alert').innerHTML = '';
  openModal('user-edit-modal');
}

async function saveUserEdit() {
  const id = document.getElementById('edit-user-id').value;
  const payload = {};
  const name = document.getElementById('edit-fname').value; if(name) payload.fullName = name;
  const phone = document.getElementById('edit-phone').value; if(phone) payload.phone = phone;
  setButtonLoading('user-edit-save', true);
  const res = await API.users.update(id, payload);
  setButtonLoading('user-edit-save', false);
  if (!res.ok) { document.getElementById('user-edit-alert').innerHTML=`<div class="alert alert-error">${res.data?.message||'Failed'}</div>`; return; }
  closeModal('user-edit-modal'); showToast('User updated!','success'); loadUsers();
}

function deleteUser(id, name) {
  showConfirm('Delete User', `Delete user <strong>${name}</strong>? This cannot be undone.`, async () => {
    const res = await API.users.remove(id);
    if (res.ok) { showToast('User deleted','success'); loadUsers(); }
    else showToast(res.data?.message||'Failed','error');
  });
}
</script>
</body>
</html>
