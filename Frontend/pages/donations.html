<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donations — LifePulse</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h1>Donation Records</h1><p>Track all blood donations and statistics.</p></div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openModal('don-modal')">+ Record Donation</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="don-stats" style="margin-bottom:28px;">
        <div class="stat-card"><div class="stat-icon red">💉</div><div class="stat-info"><div class="stat-value" id="ds-total">—</div><div class="stat-label">Total Donations</div></div></div>
        <div class="stat-card"><div class="stat-icon green">📦</div><div class="stat-info"><div class="stat-value" id="ds-units">—</div><div class="stat-label">Units Collected</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">✅</div><div class="stat-info"><div class="stat-value" id="ds-completed">—</div><div class="stat-label">Completed</div></div></div>
        <div class="stat-card"><div class="stat-icon yellow">❌</div><div class="stat-info"><div class="stat-value" id="ds-cancelled">—</div><div class="stat-label">Cancelled</div></div></div>
      </div>

      <div class="filters-bar">
        <select class="form-control" id="f-donor" onchange="loadDonations()"><option value="">All Donors</option></select>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('f-donor').value='';loadDonations()">✕ Clear</button>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0">
          <div id="don-table"><div class="loading-overlay"><div class="loading-spinner"></div><p>Loading…</p></div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Record Donation Modal -->
<div class="modal-overlay" id="don-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Record Donation</span><button class="modal-close" onclick="closeModal('don-modal')">✕</button></div>
    <div class="modal-body">
      <div id="don-alert"></div>
      <div class="form-group"><label class="form-label">Donor *</label>
        <select class="form-control" id="don-donor"><option value="">Select Donor</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Donation Date *</label>
          <input type="datetime-local" class="form-control" id="don-date" required>
        </div>
        <div class="form-group"><label class="form-label">Units Donated *</label>
          <input type="number" class="form-control" id="don-units" min="1" value="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Blood Group</label>
          <select class="form-control" id="don-bg">
            <option value="">Auto (from donor)</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Hemoglobin (g/dL)</label>
          <input type="number" class="form-control" id="don-hemo" step="0.1">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label>
        <textarea class="form-control" id="don-notes" placeholder="Any remarks…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('don-modal')">Cancel</button>
      <button class="btn btn-primary" id="don-save" onclick="saveDonation()">Record</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth(['admin'])) return;
  buildLayout({ activePage: 'donations.html', pageTitle: 'Donations', breadcrumb: 'Home / Donations' });
  loadStats();
  loadDonorOptions();
  loadDonations();
});

async function loadStats() {
  const res = await API.donations.getStats();
  if (!res.ok) return;
  const s = res.data;
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val??'—'; };
  set('ds-total', s.total || s.totalDonations);
  set('ds-units', s.totalUnits || s.unitsCollected);
  set('ds-completed', s.completed || s.completedDonations);
  set('ds-cancelled', s.cancelled || s.cancelledDonations);
}

async function loadDonorOptions() {
  const res = await API.donors.findAll();
  if (!res.ok) return;
  const donors = Array.isArray(res.data) ? res.data : (res.data?.data || []);
  ['don-donor','f-donor'].forEach(selId => {
    const sel = document.getElementById(selId);
    donors.forEach(d => { const o=document.createElement('option'); o.value=d.id; o.textContent=`${d.fullName} (${d.bloodGroup})`; sel.appendChild(o); });
  });
}

async function loadDonations() {
  const el = document.getElementById('don-table');
  el.innerHTML = loadingState();
  const donorId = document.getElementById('f-donor').value;
  const res = donorId ? await API.donations.findByDonor(donorId) : await API.donations.findAll();
  if (!res.ok) { el.innerHTML = emptyState('❌', 'Failed to load', ''); return; }
  const items = Array.isArray(res.data) ? res.data : (res.data?.data || []);
  if (!items.length) { el.innerHTML = emptyState('💉', 'No donations recorded', ''); return; }
  el.innerHTML = `<div class="table-container"><table>
    <thead><tr><th>Donor</th><th>Blood</th><th>Units</th><th>Hemoglobin</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${items.map(d => `<tr>
      <td><div style="font-weight:600">${d.donor?.fullName||d.donorName||'—'}</div></td>
      <td>${bloodBadge(d.bloodGroup||d.donor?.bloodGroup)}</td>
      <td><strong>${d.unitsdonated??d.units??d.unitsCollected??'—'}</strong></td>
      <td>${d.hemoglobinAtDonation?d.hemoglobinAtDonation+' g/dL':(d.hemoglobin?d.hemoglobin+' g/dL':'—')}</td>
      <td style="font-size:0.85rem">${formatDate(d.date||d.donationDate||d.createdAt)}</td>
      <td>${statusBadge(d.status)}</td>
      <td>${d.status!=='cancelled'?`<button class="btn btn-ghost btn-sm" onclick="cancelDonation('${d.id}')">Cancel</button>`:''}
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function saveDonation() {
  const donorId = document.getElementById('don-donor').value;
  const rawDate = document.getElementById('don-date').value;
  const unitsRaw = parseInt(document.getElementById('don-units').value);
  const bg = document.getElementById('don-bg').value;

  if (!donorId) { document.getElementById('don-alert').innerHTML=`<div class="alert alert-error">Please select a donor.</div>`; return; }
  if (!rawDate) { document.getElementById('don-alert').innerHTML=`<div class="alert alert-error">Donation date is required.</div>`; return; }
  if (!unitsRaw || unitsRaw < 1) { document.getElementById('don-alert').innerHTML=`<div class="alert alert-error">Units donated must be at least 1.</div>`; return; }
  if (!bg) { document.getElementById('don-alert').innerHTML=`<div class="alert alert-error">Please select a blood group.</div>`; return; }

  setButtonLoading('don-save', true);

  const donationDate = new Date(rawDate).toISOString();

  const payload = {
    donorId,
    donationDate,
    unitsdonated: unitsRaw,
    bloodGroup: bg,
  };

  const hemo = document.getElementById('don-hemo').value;
  if (hemo) payload.hemoglobinAtDonation = parseFloat(hemo);

  const notes = document.getElementById('don-notes').value;
  if (notes) payload.notes = notes;

  const res = await API.donations.create(payload);
  setButtonLoading('don-save', false);
  if (!res.ok) { document.getElementById('don-alert').innerHTML=`<div class="alert alert-error">${res.data?.message||'Failed'}</div>`; return; }
  closeModal('don-modal'); showToast('Donation recorded!', 'success'); loadDonations(); loadStats();
}

function cancelDonation(id) {
  showConfirm('Cancel Donation', 'Cancel this donation record?', async () => {
    const res = await API.donations.cancel(id);
    if (res.ok) { showToast('Cancelled', 'success'); loadDonations(); }
    else showToast(res.data?.message||'Failed', 'error');
  });
}
</script>
</body>
</html>
